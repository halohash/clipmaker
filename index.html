    <script data-cfasync="false" type="text/javascript">
      var freestar = freestar || {};
      freestar.queue = freestar.queue || [];
      freestar.config = freestar.config || {};
      freestar.config.enabled_slots = [];
      freestar.initCallback = function () { (freestar.config.enabled_slots.length === 0) ? freestar.initCallbackCalled = false : freestar.newAdSlots(freestar.config.enabled_slots) }
    </script>

    <script>
      var PZ = {};
      PZ.apiOrigin = "https://halohash.github.io/clipmaker/api";
      PZ.blobOrigin = "https://file.garden/aUYIWVAKvQxCBY-_/database/panzoid/data";
      PZ.creationsOrigin = "https://file.garden/aUYIWVAKvQxCBY-_/database/panzoid";
      PZ.projectOrigin = "https://file.garden/aUYIWVAKvQxCBY-_/database/panzoid";
      PZ.account =
      {
        //currentUser: undefined,
        //csrf: undefined,
        updatePromise: null
      };

      PZ.account.getCurrent = async function ()
      {
        if (typeof this.currentUser === "undefined")
        {
          if (!this.updatePromise)
          {
            this.updatePromise = PZ.account.update();
          }

          await this.updatePromise;
        }

        return this.currentUser;
      };

      PZ.account.update = async function ()
      {
        try
        {
          var response = await PZ.api("/users/me", "get");
          if (response.status !== 200)
          {
            PZ.account.currentUser = null;
          }
          else
          {
            var json = await response.json();
            PZ.account.currentUser = json;
          }
        }
        catch (e)
        {
          PZ.account.currentUser = null;
        }
      };

      PZ.api = async function (url, op, body)
      {
        url = PZ.apiOrigin + url;

        if (op !== "get" && op !== "head")
        {
          var headers = new Headers();

          if (body instanceof FormData === false)
          {
            headers.append("Content-Type", "application/json");
            body = JSON.stringify(body);
            console.log(body);
          }
        }

        var params =
        {
          method: op,
          headers: headers,
          cache: 'default',
          credentials: 'include',
          body: body
        };
        return fetch(url, params);
      };

      PZ.getproj = async function (url, op, body)
      {
        url = PZ.projectOrigin + url;

        if (op !== "get" && op !== "head")
        {
          var headers = new Headers();

          if (body instanceof FormData === false)
          {
            headers.append("Content-Type", "application/json");
            body = JSON.stringify(body);
            console.log(body);
          }
        }

        var params =
        {
          method: op,
          headers: headers,
          cache: 'default',
          credentials: 'include',
          body: body
        };
        return fetch(url, params);
      };

      PZ.account.getCurrent();
    </script>
